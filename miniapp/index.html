<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>LUCHBAR • Бронирование</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#0b0b0b;
      --card:#131313;
      --stroke:rgba(255,255,255,.08);
      --text:#f5f5f5;
      --muted:rgba(255,255,255,.62);
      --accent:#cc9933;
      --danger:#ff6b6b;
      --ok:#61d095;
      --radius:18px;
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    .page{ min-height:100vh; display:flex; justify-content:center; padding:16px; }
    .card{ width:min(100%,560px); background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); border:1px solid var(--stroke); border-radius:var(--radius); padding:18px; }
    h1{ margin:0 0 8px 0; font-size:26px; }
    .sub{ margin:0 0 16px 0; color:var(--muted); font-size:14px; }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field{ display:flex; flex-direction:column; gap:6px; }
    .full{ grid-column:1/-1; }
    .label{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    input,select,textarea,button{ font:inherit; }
    input,select,textarea{ width:100%; border:1px solid rgba(255,255,255,.14); background:rgba(20,20,20,.6); color:var(--text); border-radius:12px; }
    input,select{ height:48px; padding:0 12px; }
    textarea{ min-height:96px; padding:10px 12px; resize:vertical; }
    .actions{ margin-top:14px; }
    .btn{ width:100%; min-height:52px; border:none; border-radius:12px; background:var(--accent); color:#0b0b0b; font-weight:700; cursor:pointer; }
    .btn[disabled]{ opacity:.6; cursor:not-allowed; }
    .error{ margin-top:10px; color:var(--danger); min-height:18px; font-size:13px; }
    .status{ margin-top:10px; padding:10px 12px; border-radius:10px; display:none; font-size:14px; }
    .status.show{ display:block; }
    .ok{ background:rgba(97,208,149,.12); border:1px solid rgba(97,208,149,.24); color:#a8f0d8; }
    .bad{ background:rgba(255,107,107,.12); border:1px solid rgba(255,107,107,.24); color:#ffc4c4; }
    @media (max-width:640px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Бронирование</h1>
      <p class="sub">После отправки заявка уходит администраторам в Telegram.</p>

      <form id="reserveForm" novalidate>
        <div class="grid">
          <label class="field" for="date">
            <span class="label">Дата</span>
            <input type="date" id="date" required />
          </label>

          <label class="field" for="time">
            <span class="label">Время</span>
            <input type="time" id="time" required step="300" />
          </label>

          <label class="field" for="guests">
            <span class="label">Гостей</span>
            <select id="guests" required>
              <option value="">Выберите</option>
              <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
              <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
              <option>12</option><option>15</option><option>20</option>
            </select>
          </label>

          <label class="field full" for="comment">
            <span class="label">Комментарий</span>
            <textarea id="comment" placeholder="Например: стол у окна"></textarea>
          </label>
        </div>

        <div id="error" class="error"></div>
        <div class="actions">
          <button id="submitBtn" class="btn" type="submit">Отправить заявку</button>
        </div>
        <div id="statusOk" class="status ok"></div>
        <div id="statusBad" class="status bad"></div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      var API_BASE = (window.BOOKING_API_BASE || "https://botluch-production.up.railway.app").replace(/\/$/, "");

      var form = document.getElementById("reserveForm");
      var dateInput = document.getElementById("date");
      var timeInput = document.getElementById("time");
      var guestsInput = document.getElementById("guests");
      var commentInput = document.getElementById("comment");
      var submitBtn = document.getElementById("submitBtn");
      var errorBox = document.getElementById("error");
      var statusOk = document.getElementById("statusOk");
      var statusBad = document.getElementById("statusBad");

      function pad(n) { return String(n).padStart(2, "0"); }
      function toDateISO(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
      function toTimeHM(d) { return pad(d.getHours()) + ":" + pad(d.getMinutes()); }

      function resetStatus() {
        errorBox.textContent = "";
        statusOk.className = "status ok";
        statusOk.textContent = "";
        statusBad.className = "status bad";
        statusBad.textContent = "";
      }

      function showError(text) { resetStatus(); errorBox.textContent = text || ""; }
      function showOk(text) { resetStatus(); statusOk.className = "status ok show"; statusOk.textContent = text; }
      function showBad(text) { resetStatus(); statusBad.className = "status bad show"; statusBad.textContent = text; }

      function applyConstraints() {
        var now = new Date();
        var minDt = new Date(now.getTime() + 20 * 60 * 1000);
        dateInput.min = toDateISO(now);
        if (!dateInput.value) dateInput.value = toDateISO(now);
        if (!timeInput.value) timeInput.value = toTimeHM(minDt);
      }

      function validate() {
        if (!dateInput.value) { showError("Выберите дату."); return false; }
        if (!timeInput.value) { showError("Выберите время."); return false; }
        if (!guestsInput.value) { showError("Выберите количество гостей."); return false; }
        return true;
      }

      applyConstraints();
      dateInput.addEventListener("change", applyConstraints);

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!validate()) return;

        submitBtn.disabled = true;
        var payload = {
          date: dateInput.value,
          time: timeInput.value,
          guests: guestsInput.value,
          comment: (commentInput.value || "").trim(),
          initData: tg && tg.initData ? tg.initData : ""
        };

        fetch(API_BASE + "/api/booking", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res && res.ok) {
            showOk("Заявка отправлена ✓");
            setTimeout(function () {
              if (tg && typeof tg.close === "function") tg.close();
            }, 900);
          } else {
            showBad((res && res.error) || "Ошибка отправки. Попробуйте ещё раз.");
            submitBtn.disabled = false;
          }
        })
        .catch(function () {
          showBad("Не удалось отправить заявку. Попробуйте ещё раз.");
          submitBtn.disabled = false;
        });
      });
    })();
  </script>
</body>
</html>
